name: Bug Report
description: Report incorrect parsing, normalization, or diff behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: input
    attributes:
      label: Minimal input
      description: Paste minimal before/after config examples. Redact secrets.
      render: yaml
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "agent-scope-diff 0.1.0"

